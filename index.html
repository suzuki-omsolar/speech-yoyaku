<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoGemini</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for premium icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <i class="ph ph-microphone-stage"></i>
                <h1>MemoGemini</h1>
            </div>
            <button id="settingsBtn" class="icon-btn" title="APIキー設定">
                <i class="ph ph-gear"></i>
            </button>
        </header>

        <main>
            <div class="input-section glass-panel">
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span id="statusText">待機中</span>
                </div>
                
                <div class="transcript-container">
                    <p id="transcript" class="placeholder">マイクボタンを押して話し始めてください...</p>
                    <button id="copyTranscriptBtn" class="copy-icon-btn hidden" title="文字起こしをコピー">
                        <i class="ph ph-copy"></i>
                    </button>
                </div>

                <div class="controls">
                    <button id="recordBtn" class="primary-btn">
                        <i class="ph ph-microphone"></i>
                        <span>入力開始</span>
                    </button>
                    <button id="stopBtn" class="danger-btn hidden">
                        <i class="ph ph-stop-circle"></i>
                        <span>停止</span>
                    </button>
                    <button id="summarizeBtn" class="action-btn" disabled>
                        <i class="ph ph-sparkle"></i>
                        <span>要約する</span>
                    </button>
                </div>
            </div>

            <div class="loading-overlay hidden" id="loadingOverlay">
                <div class="spinner"></div>
                <p>AIが要約しています...</p>
            </div>

            <div id="resultSection" class="result-section hidden">
                <div class="glass-panel result-card">
                    <h2>AI 要約結果</h2>
                    <div class="result-items" id="resultItems">
                        <!-- 結果がここに入ります -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- API Key Modal -->
    <div id="settingsModal" class="modal hidden">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2>設定</h2>
                <button id="closeSettingsBtn" class="icon-btn">
                    <i class="ph ph-x"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="apiKey">Gemini API Key</label>
                    <input type="password" id="apiKey" placeholder="AIzaSy..." autocomplete="off">
                </div>
                <div class="form-group" style="margin-top: 1rem;">
                    <label>Selected AI Model</label>
                    <div id="currentModelDisplay" style="font-size: 0.9rem; color: var(--accent-color); padding: 0.75rem; background: rgba(255,255,255,0.05); border-radius: 0.5rem; text-align: center;">最新モデルを取得中...</div>
                </div>
                <p class="help-text" style="margin-top:0.75rem; font-size: 0.8rem; color: var(--text-secondary);">APIキーを使って最新の最適なモデルを自動的に選択します。</p>
            </div>
            <div class="modal-footer">
                <button id="saveSettingsBtn" class="primary-btn">保存</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
